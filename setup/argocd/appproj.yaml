apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: auto-rollback
  namespace: argocd
spec:
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace
  destinations:
  - name: '*'
    namespace: kargo-auto-rollback-*
    server: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  sourceRepos:
  - https://github.com/jessesuen/kargo-auto-rollback.git
  - https://github.com/jessesuen/otel-app.git
